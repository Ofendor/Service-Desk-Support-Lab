# Docker Compose file for osTicket and MariaDB services 
# This configuration sets up a basic osTicket environment with a MariaDB database.
version: '3' # Use version 3 of the Docker Compose file format

services: # Define the services that will be run in the Docker environment
  db:
    image: mariadb:10.6 # Use the official MariaDB image, version 10.6
    environment:
      MYSQL_ROOT_PASSWORD: OsticketRoot123! # Set the root password for the MariaDB instance
      MYSQL_DATABASE: osticket # Create a database named 'osticket' for osTicket to use
      MYSQL_USER: osticket # Create a user named 'osticket' for osTicket to connect with
      MYSQL_PASSWORD: OsticketPass123! # Set the password for the 'osticket' user
    volumes:
      - db_data:/var/lib/mysql # Persist the database data in a Docker volume named 'db_data'
    restart: always # Automatically restart the database container if it stops

  osticket:
    image: campbellsoftwaresolutions/osticket # Use the osTicket image from Campbell Software Solutions
    environment:
      MYSQL_HOST: db # Set the database host to the name of the database service defined above
      MYSQL_DATABASE: osticket # Set the database name to match the one created in the database service
      MYSQL_USER: osticket # Set the database user to match the one created in the database service
      MYSQL_PASSWORD: OsticketPass123! # Set the database password to match the one created in the database service
    ports:
      - "8081:80" # Map port 80 in the container to port 8081 on the host machine for web access
    volumes:
      - osticket_data:/var/www/html # Persist the osTicket data in a Docker volume named 'osticket_data'
    restart: always # Automatically restart the osTicket container if it stops
    depends_on:
      - db # Ensure that the osTicket service starts after the database service is up and running

volumes: # Define the Docker volumes that will be used to persist data for the services
  db_data: # Define the Docker volume for persisting data for the MariaDB database service
  osticket_data: # Define the Docker volumes for persisting data for both the database and osTicket services